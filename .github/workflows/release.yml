name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  npm-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npm publish
        if: ${{ !contains(github.ref, '-rc') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  binaries:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: darwin-arm64
          - os: ubuntu-latest
            arch: linux-x64
          - os: ubuntu-24.04-arm
            arch: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun build --compile ./src/index.ts --outfile gx-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gx-${{ matrix.arch }}
          path: gx-${{ matrix.arch }}

  release:
    needs: [binaries]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gx-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: shasum -a 256 gx-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gx-*
            checksums.txt
          generate_release_notes: true
